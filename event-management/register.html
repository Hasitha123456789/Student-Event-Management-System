<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Event Management</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="form-box">
            <h2>Student Registration</h2>
            <form id="registerForm">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="name" required>
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="input-group">
                    <label>Contact Number</label>
                    <input type="tel" id="contact" pattern="[0-9]{10}" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" minlength="6" required>
                </div>
                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" required>
                </div>
                <div id="message"></div>
                <button type="submit" class="btn">Register</button>
            </form>
            <p class="link">Already have an account? <a href="login.html">Login here</a></p>
        </div>
    </div>
    <script src="js/script.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const contact = document.getElementById('contact').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageDiv = document.getElementById('message');
            
            // Validate passwords match
            if (password !== confirmPassword) {
                messageDiv.innerHTML = '<p class="error">Passwords do not match!</p>';
                return;
            }
            
            // Send to backend
            const formData = new FormData();
            formData.append('name', name);
            formData.append('email', email);
            formData.append('contact', contact);
            formData.append('password', password);
            
            try {
                const response = await fetch('php/register.php', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    messageDiv.innerHTML = '<p class="success">' + result.message + '</p>';
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    messageDiv.innerHTML = '<p class="error">' + result.message + '</p>';
                }
            } catch (error) {
                messageDiv.innerHTML = '<p class="error">Registration failed. Please try again.</p>';
            }
        });
    </script>
</body>
</html>
