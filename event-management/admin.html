<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Event Management</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #ddd;
        }
        .tab {
            padding: 12px 24px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #666;
            border-bottom: 3px solid transparent;
        }
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-card h3 {
            font-size: 36px;
            margin: 0;
        }
        .stat-card p {
            margin: 10px 0 0 0;
            opacity: 0.9;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        table th, table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        table th {
            background: #667eea;
            color: white;
        }
        table tr:hover {
            background: #f5f5f5;
        }
        .btn-small {
            padding: 6px 12px;
            font-size: 14px;
            margin: 0 5px;
        }
        .btn-edit {
            background: #3498db;
        }
        .btn-delete {
            background: #e74c3c;
        }
        .form-grid {
            display: grid;
            gap: 15px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #666;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1>Admin Dashboard</h1>
        <div>
            <span id="adminName"></span>
            <button onclick="logout()" class="btn-logout">Logout</button>
        </div>
    </nav>
    
    <div class="container">
        <div class="admin-container">
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <h3 id="totalEvents">0</h3>
                    <p>Total Events</p>
                </div>
                <div class="stat-card">
                    <h3 id="totalUsers">0</h3>
                    <p>Total Users</p>
                </div>
                <div class="stat-card">
                    <h3 id="totalRegistrations">0</h3>
                    <p>Total Registrations</p>
                </div>
            </div>
            
            <div class="tabs">
                <button class="tab active" onclick="switchTab('events')">Manage Events</button>
                <button class="tab" onclick="switchTab('users')">View Users</button>
                <button class="tab" onclick="switchTab('registrations')">View Registrations</button>
            </div>
            
            <!-- Events Tab -->
            <div id="eventsTab" class="tab-content active">
                <button class="btn" onclick="showAddEventModal()">+ Add New Event</button>
                <div id="message"></div>
                <table id="eventsTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Title</th>
                            <th>Date</th>
                            <th>Venue</th>
                            <th>Organizer</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="eventsTableBody">
                        <tr><td colspan="6">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Users Tab -->
            <div id="usersTab" class="tab-content">
                <table id="usersTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Contact</th>
                            <th>Admin</th>
                            <th>Registered</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <tr><td colspan="6">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Registrations Tab -->
            <div id="registrationsTab" class="tab-content">
                <table id="registrationsTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Student Name</th>
                            <th>Event Title</th>
                            <th>Registration Date</th>
                        </tr>
                    </thead>
                    <tbody id="registrationsTableBody">
                        <tr><td colspan="4">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <!-- Add/Edit Event Modal -->
    <div id="eventModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Event</h2>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <form id="eventForm" class="form-grid">
                <input type="hidden" id="eventId">
                <div class="input-group">
                    <label>Event Title *</label>
                    <input type="text" id="eventTitle" required>
                </div>
                <div class="input-group">
                    <label>Date *</label>
                    <input type="date" id="eventDate" required>
                </div>
                <div class="input-group">
                    <label>Venue *</label>
                    <input type="text" id="eventVenue" required>
                </div>
                <div class="input-group">
                    <label>Organizer *</label>
                    <input type="text" id="eventOrganizer" required>
                </div>
                <div class="input-group">
                    <label>Description</label>
                    <textarea id="eventDescription" rows="4"></textarea>
                </div>
                <button type="submit" class="btn">Save Event</button>
            </form>
        </div>
    </div>
    
    <script>
        let currentTab = 'events';
        let editingEventId = null;
        
        // Check admin authentication
        async function checkAuth() {
            try {
                const response = await fetch('php/check_auth.php');
                const result = await response.json();
                
                if (!result.loggedIn || !result.is_admin) {
                    alert('Access denied. Admin only.');
                    window.location.href = 'login.html';
                    return false;
                }
                
                document.getElementById('adminName').textContent = 'Welcome, ' + result.name;
                loadDashboard();
                return true;
            } catch (error) {
                console.error('Auth error:', error);
                window.location.href = 'login.html';
                return false;
            }
        }
        
        // Load dashboard data
        async function loadDashboard() {
            await loadStats();
            await loadEvents();
            await loadUsers();
            await loadRegistrations();
        }
        
        // Load statistics
        async function loadStats() {
            try {
                const response = await fetch('php/admin_stats.php');
                const stats = await response.json();
                
                document.getElementById('totalEvents').textContent = stats.events || 0;
                document.getElementById('totalUsers').textContent = stats.users || 0;
                document.getElementById('totalRegistrations').textContent = stats.registrations || 0;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
        
        // Load events
        async function loadEvents() {
            try {
                const response = await fetch('php/admin_events.php');
                const events = await response.json();
                
                const tbody = document.getElementById('eventsTableBody');
                tbody.innerHTML = '';
                
                if (events.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6">No events found</td></tr>';
                    return;
                }
                
                events.forEach(event => {
                    const row = tbody.insertRow();
                    row.innerHTML = `
                        <td>${event.event_id}</td>
                        <td>${escapeHtml(event.title)}</td>
                        <td>${event.date}</td>
                        <td>${escapeHtml(event.venue)}</td>
                        <td>${escapeHtml(event.organizer)}</td>
                        <td>
                            <button class="btn btn-small btn-edit" onclick="editEvent(${event.event_id})">Edit</button>
                            <button class="btn btn-small btn-delete" onclick="deleteEvent(${event.event_id})">Delete</button>
                        </td>
                    `;
                });
            } catch (error) {
                console.error('Error loading events:', error);
            }
        }
        
        // Load users
        async function loadUsers() {
            try {
                const response = await fetch('php/admin_users.php');
                const users = await response.json();
                
                const tbody = document.getElementById('usersTableBody');
                tbody.innerHTML = '';
                
                if (users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6">No users found</td></tr>';
                    return;
                }
                
                users.forEach(user => {
                    const row = tbody.insertRow();
                    row.innerHTML = `
                        <td>${user.user_id}</td>
                        <td>${escapeHtml(user.name)}</td>
                        <td>${escapeHtml(user.email)}</td>
                        <td>${escapeHtml(user.contact_number || 'N/A')}</td>
                        <td>${user.is_admin ? '✅ Yes' : 'No'}</td>
                        <td>${user.created_at}</td>
                    `;
                });
            } catch (error) {
                console.error('Error loading users:', error);
            }
        }
        
        // Load registrations
        async function loadRegistrations() {
            try {
                const response = await fetch('php/admin_registrations.php');
                const registrations = await response.json();
                
                const tbody = document.getElementById('registrationsTableBody');
                tbody.innerHTML = '';
                
                if (registrations.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4">No registrations found</td></tr>';
                    return;
                }
                
                registrations.forEach(reg => {
                    const row = tbody.insertRow();
                    row.innerHTML = `
                        <td>${reg.reg_id}</td>
                        <td>${escapeHtml(reg.student_name)}</td>
                        <td>${escapeHtml(reg.event_title)}</td>
                        <td>${reg.timestamp}</td>
                    `;
                });
            } catch (error) {
                console.error('Error loading registrations:', error);
            }
        }
        
        // Switch tabs
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + 'Tab').classList.add('active');
            currentTab = tab;
        }
        
        // Show add event modal
        function showAddEventModal() {
            editingEventId = null;
            document.getElementById('modalTitle').textContent = 'Add New Event';
            document.getElementById('eventForm').reset();
            document.getElementById('eventId').value = '';
            document.getElementById('eventModal').classList.add('active');
        }
        
        // Edit event
        async function editEvent(eventId) {
            try {
                const response = await fetch(`php/admin_events.php?id=${eventId}`);
                const event = await response.json();
                
                editingEventId = eventId;
                document.getElementById('modalTitle').textContent = 'Edit Event';
                document.getElementById('eventId').value = event.event_id;
                document.getElementById('eventTitle').value = event.title;
                document.getElementById('eventDate').value = event.date;
                document.getElementById('eventVenue').value = event.venue;
                document.getElementById('eventOrganizer').value = event.organizer;
                document.getElementById('eventDescription').value = event.description || '';
                document.getElementById('eventModal').classList.add('active');
            } catch (error) {
                alert('Error loading event details');
            }
        }
        
        // Delete event
        async function deleteEvent(eventId) {
            if (!confirm('Are you sure you want to delete this event?')) return;
            
            try {
                const formData = new FormData();
                formData.append('action', 'delete');
                formData.append('event_id', eventId);
                
                const response = await fetch('php/admin_events.php', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage('Event deleted successfully', 'success');
                    loadEvents();
                    loadStats();
                } else {
                    showMessage(result.message, 'error');
                }
            } catch (error) {
                showMessage('Error deleting event', 'error');
            }
        }
        
        // Close modal
        function closeModal() {
            document.getElementById('eventModal').classList.remove('active');
        }
        
        // Save event (add or update)
        document.getElementById('eventForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('action', editingEventId ? 'update' : 'create');
            if (editingEventId) formData.append('event_id', editingEventId);
            formData.append('title', document.getElementById('eventTitle').value);
            formData.append('date', document.getElementById('eventDate').value);
            formData.append('venue', document.getElementById('eventVenue').value);
            formData.append('organizer', document.getElementById('eventOrganizer').value);
            formData.append('description', document.getElementById('eventDescription').value);
            
            try {
                const response = await fetch('php/admin_events.php', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage(result.message, 'success');
                    closeModal();
                    loadEvents();
                    loadStats();
                } else {
                    showMessage(result.message, 'error');
                }
            } catch (error) {
                showMessage('Error saving event', 'error');
            }
        });
        
        // Show message
        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = `<p class="${type}">${msg}</p>`;
            setTimeout(() => messageDiv.innerHTML = '', 3000);
        }
        
        // Logout
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                window.location.href = 'php/logout.php';
            }
        }
        
        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Initialize
        checkAuth();
    </script>
</body>
</html>
