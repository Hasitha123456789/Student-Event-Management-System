<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Event Management System</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .hero {
            background: white;
            padding: 60px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-top: 50px;
        }
        .hero h1 {
            font-size: 42px;
            color: #667eea;
            margin-bottom: 20px;
        }
        .hero p {
            font-size: 18px;
            color: #666;
            margin-bottom: 40px;
        }
        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .btn-primary {
            padding: 15px 40px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 16px;
            transition: 0.3s;
        }
        .btn-primary:hover {
            background: #5568d3;
        }
        .btn-secondary {
            padding: 15px 40px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border: 2px solid #667eea;
            border-radius: 5px;
            font-size: 16px;
            transition: 0.3s;
        }
        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>Student Event Management System</h1>
            <p>Organize, manage, and participate in university events with ease</p>
            <div class="btn-group">
                <a href="login.html" class="btn-primary">Login</a>
                <a href="register.html" class="btn-secondary">Register</a>
            </div>
        </div>
    </div>
</body>
</html>
