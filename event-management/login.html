<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Event Management</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="form-box">
            <h2>Student Login</h2>
            <form id="loginForm">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <div id="message"></div>
                <button type="submit" class="btn">Login</button>
            </form>
            <p class="link">Don't have an account? <a href="register.html">Register here</a></p>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            
            const formData = new FormData();
            formData.append('email', email);
            formData.append('password', password);
            
            try {
                const response = await fetch('php/login.php', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    messageDiv.innerHTML = '<p class="success">' + result.message + '</p>';
                    setTimeout(() => {
                        if (result.is_admin) {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'events.html';
                        }
                    }, 1000);
                } else {
                    messageDiv.innerHTML = '<p class="error">' + result.message + '</p>';
                }
            } catch (error) {
                messageDiv.innerHTML = '<p class="error">Login failed. Please try again.</p>';
            }
        });
    </script>
</body>
</html>
