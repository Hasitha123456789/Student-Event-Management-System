<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - Event Management</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <h1>Event Management System</h1>
        <div>
            <span id="userName"></span>
            <button onclick="logout()" class="btn-logout">Logout</button>
        </div>
    </nav>
    
    <div class="container">
        <h2>Available Events</h2>
        <div id="message" style="margin-bottom: 20px;"></div>
        <div id="eventsContainer">Loading events...</div>
    </div>
    
    <script>
        let currentUserId = null;
        
        // Check if user is logged in
        async function checkAuth() {
            try {
                const response = await fetch('php/check_auth.php');
                const result = await response.json();
                
                console.log('Auth check:', result);
                
                if (!result.loggedIn) {
                    alert('Please login first');
                    window.location.href = 'login.html';
                    return false;
                } else {
                    currentUserId = result.user_id;
                    document.getElementById('userName').textContent = 'Welcome, ' + result.name;
                    loadEvents();
                    return true;
                }
            } catch (error) {
                console.error('Auth check error:', error);
                alert('Authentication error. Please login again.');
                window.location.href = 'login.html';
                return false;
            }
        }
        
        // Load events
        async function loadEvents() {
            try {
                const response = await fetch('php/get_events.php');
                
                if (!response.ok) {
                    throw new Error('Failed to fetch events');
                }
                
                const events = await response.json();
                console.log('Events loaded:', events);
                
                const container = document.getElementById('eventsContainer');
                container.innerHTML = '';
                
                if (!Array.isArray(events) || events.length === 0) {
                    container.innerHTML = '<p>No events available at the moment.</p>';
                    return;
                }
                
                events.forEach(event => {
                    const card = document.createElement('div');
                    card.className = 'event-card';
                    
                    const isRegistered = event.is_registered === true || event.is_registered === 1;
                    
                    card.innerHTML = `
                        <h3>${escapeHtml(event.title)}</h3>
                        <p><strong>Date:</strong> ${escapeHtml(event.date)}</p>
                        <p><strong>Venue:</strong> ${escapeHtml(event.venue)}</p>
                        <p><strong>Organizer:</strong> ${escapeHtml(event.organizer)}</p>
                        <p>${escapeHtml(event.description || '')}</p>
                        ${isRegistered ? 
                            '<button class="btn-registered" disabled>Already Registered ✓</button>' :
                            `<button class="btn" onclick="registerEvent(${event.event_id})">Register Now</button>`
                        }
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error('Error loading events:', error);
                document.getElementById('eventsContainer').innerHTML =
                    '<p style="color: red;">Failed to load events. Please refresh the page.</p>';
            }
        }
        
        // Register for event
        async function registerEvent(eventId) {
            console.log('Registering for event:', eventId);
            
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = '<p style="color: blue;">Processing registration...</p>';
            
            try {
                const formData = new FormData();
                formData.append('event_id', eventId);
                
                const response = await fetch('php/register_event.php', {
                    method: 'POST',
                    body: formData
                });
                
                console.log('Registration response status:', response.status);
                
                const responseText = await response.text();
                console.log('Registration raw response:', responseText);
                
                let result;
                try {
                    result = JSON.parse(responseText);
                } catch (e) {
                    console.error('JSON parse error:', e);
                    messageDiv.innerHTML = '<p class="error">Server error: ' + responseText.substring(0, 100) + '</p>';
                    return;
                }
                
                console.log('Registration result:', result);
                
                if (result.success) {
                    messageDiv.innerHTML = '<p class="success">' + escapeHtml(result.message) + '</p>';
                    // Reload events to update UI
                    setTimeout(() => {
                        messageDiv.innerHTML = '';
                        loadEvents();
                    }, 2000);
                } else {
                    messageDiv.innerHTML = '<p class="error">' + escapeHtml(result.message) + '</p>';
                    setTimeout(() => {
                        messageDiv.innerHTML = '';
                    }, 3000);
                }
            } catch (error) {
                console.error('Registration error:', error);
                messageDiv.innerHTML = '<p class="error">Network error. Please try again.</p>';
                setTimeout(() => {
                    messageDiv.innerHTML = '';
                }, 3000);
            }
        }
        
        // Logout
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                window.location.href = 'php/logout.php';
            }
        }
        
        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Initialize
        checkAuth();
    </script>
</body>
</html>
